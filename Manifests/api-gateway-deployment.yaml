---
# API Gateway Deployment (Stateless, scalable, externally exposed)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway-app
  template:
    metadata:
      labels:
        app: api-gateway-app
    spec:
      containers:
        - name: api-gateway-app
          # Replace with your actual Docker Hub image
          image: hussainsaddam/api-gateway:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-app:8080"
            - name: BILLING_SERVICE_URL
              value: "http://billing-app:8080"
            - name: PORT
              value: "3000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

---
# NodePort Service for API Gateway (Externally accessible)
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-app
  namespace: default
spec:
  type: NodePort
  selector:
    app: api-gateway-app
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
      protocol: TCP
      name: http
