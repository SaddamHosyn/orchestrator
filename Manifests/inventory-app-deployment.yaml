---
# Inventory App Deployment (Stateless, scalable)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-app
  template:
    metadata:
      labels:
        app: inventory-app
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - /bin/sh
            - -c
            - |
              until pg_isready -h inventory-database -p 5432 -U inventory_user; do
                echo "Waiting for inventory-database...";
                sleep 3;
              done;
              PGPASSWORD=inventory_pass psql -h inventory-database -p 5432 -U inventory_user -d movies -c "
                CREATE TABLE IF NOT EXISTS movies (
                  id SERIAL PRIMARY KEY,
                  title VARCHAR NOT NULL,
                  description TEXT,
                  genre VARCHAR,
                  release_year INTEGER,
                  rating FLOAT DEFAULT 0.0,
                  duration INTEGER,
                  available_copies INTEGER DEFAULT 0,
                  created_at TIMESTAMP,
                  updated_at TIMESTAMP
                );"
      containers:
        - name: inventory-app
          image: hussainsaddam/inventory-app:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: INVENTORY_DB_HOST
              value: "inventory-database"
            - name: INVENTORY_DB_PORT
              value: "5432"
            - name: INVENTORY_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: inventory-db-secret
                  key: POSTGRES_DB
            - name: INVENTORY_DB_USER
              valueFrom:
                secretKeyRef:
                  name: inventory-db-secret
                  key: POSTGRES_USER
            - name: INVENTORY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-db-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "384Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-app
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: inventory-app
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
